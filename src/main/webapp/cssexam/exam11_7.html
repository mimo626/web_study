<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CSS 학습</title>
<style>
  * {
    margin: 0;
    box-sizing: border-box;
  }

  header {
    height: 100px;
    background-color: rgb(208, 176, 198);
  }

  /* 
  flex : 정렬문제 해결하는 도구 
  Flex 컨테이너 : main
  Flex 아이템 : nav, section
  */
  main {
    display: flex;
    min-height: 500px;
  }

  nav {
    flex: 3;
    background-color: pink;
  }

  section {
    flex: 7;
    background-color: skyblue;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  article {
    width: 80%;
    height: 200px;
    padding: 10px;
    margin: 10px 0;
    background-color: magenta;
  }

  footer {
    height: 50px;
    background-color: lightgray;
  }
</style>
</head>
<body>
	<header>
		<h1>메인제목 : 레이아웃 나누기-Flex</h1>
		<strong>오늘은 즐거운 <mark>월요일</mark></strong>
	</header>
	<main>
		<nav>
			<em>고르세용~~ 먹고싶은거</em>
			<ul>
				<li>메뉴1</li>
				<li>메뉴2</li>
				<li>메뉴3</li>
				<li>메뉴4</li>
			</ul>
		</nav>
		<section>
			<article>
				<h2>제목1</h2>
				<p>내용1</p>
			</article>
			<article>
				<h2>제목2</h2>
				<p>내용2</p>
			</article>
		</section>
	</main>
	<footer>
		<h3>홈페이지 정보(바닥 글)</h3>
	</footer>
	<script>
		const kordayname = ["일", "월", "화", "수", "목", "금", "토"];
		document.getElementsByTagName("mark")[0].textContent = kordayname[new Date().getDay()]+"요일";
	</script>
</body>
</html>
