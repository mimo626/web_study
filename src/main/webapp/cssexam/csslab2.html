<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
	h1 {
		text-shadow: 3px 3px 5px #ff0;
	}
	
	input {
		border: 2px solid black;
		border-radius: 10px;
	}
</style>
</head>
<body>
	<div>
		<h1>회원 정보를 입력하십시오.</h1>
		<hr>
		<form action="..." method="get">
			<input type="text" required placeholder="이름을 입력하세요"><br>
			<input type="tel" pattern="{0-9}{2,3}-{0,9}{3,4}-{0,9}{4}" required placeholder="전화번호를 입력하세요"><br>
			<input type="email" required placeholder="계정을 입력하세요"><br>
			<input type="password" required placeholder="패스워드를 입력하세요"><br><br>
			<input type="submit" value="등록">
			<input type="reset" value="재작성">
		</form>
	</div>

</body>
</html>
