<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>visitorForm</title>
<style type="text/css">
	@font-face {
	    font-family: 'Cafe24Gowoonbam';
	    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Cafe24Oneprettynight.woff') format('woff');
	    font-weight: normal;
	    font-display: swap;
	}
	body {
		font-family: "Cafe24Gowoonbam";
	}
	h1 {
	text-align: center;
		text-shadow: 2px 2px 3px pink,
		 3px 3px 6px yellow,
		 5px 5px 10px red;
	}
	.container {
		margin: 20px auto; 
		padding: 50px;
		width: 500px;
		height: 400px;
		border-radius: 40px;
		background-image: linear-gradient(to top, #b9ee84, pink, white);
	}
	input {
		margin: 15px 0px;
		font-family: inherit;
	}
</style>
</head>
<body>
<h1>펜션 예약 서비스</h1>
<hr>
<div class="container">
	<form action="..." method="post">
		<label for=name>예약자명 : </label>
		<input type="text"  id=name name=name required><br><br>
		<label for=passwd>예약암호 : </label>
		<input type="password"  id=passwd name=passwd required><br><br>
		<label for=room>룸선택 : </label>
		<label><input type="radio" name=room value=r1/>둘리</label>
		<label><input type="radio" name=room value=r2/>희동</label>
		<label><input type="radio" name=room value=r3/>도우너</label>
		<label><input type="radio" name=room value=r4/>또치</label><br><br>
		<label for=add>추가요청사항 : </label>
		<label><input type="checkbox" name=add value=a1/>바베큐</label>
		<label><input type="checkbox" name=add value=a2/>수영장</label>
		<label><input type="checkbox" name=add value=a3/>낚시</label>
		<label><input type="checkbox" name=add value=a4/>조식</label><br><br>
		<label for=date>예약날짜 : </label>
		<input type="date"><br>
		<hr>
		<input type="submit" value="보내기">
		<input type="reset" value="다시작성하기">
	</form>
</div>	
</body>
</html>
