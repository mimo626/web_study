<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
	.container {
		margin: 20px auto;
		padding: 50px;
		width: 500px;
		height: 300px;
		background-image : linear-gradient(to right, purple, white, pink);
		border-radius: 30px;
		border: 10px solid pink;
		line-height: 300px;
	}
	
	.title {
		color: white;
	}
</style>
</head>
<body>
	<div class="container">
		<h1><span class="title">성적</span>을 입력하시오.</h1>
		<hr>
		<form action="..." method="get">
			<label for=name>이름 : </label>
			<input type="text" id=name name=name required><br>
			<label for=avg>평균 점수 : </label>
			<input type="number" id=avg name=avg required><br><br>
			<input type="submit" value="전송">
			<input type="reset" value="재작성">
		</form>
	</div>
</body>
</html>
