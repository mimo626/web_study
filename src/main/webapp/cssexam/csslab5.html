<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
	.container {
		margin: 20px auto; 
		width: 300px;
		height: 150px;
		background-image : linear-gradient(to right, red, orange, yellow, green, blue, navy, purple);
		text-align: center;
		line-height: 150px;
		border-radius: 20px;
		font-size: 30px; 
  	    font-weight: bold;
		color: white;
	}
	#weather{
		color: blue; 
	}
	
	main {
		width: 770px;
		margin: 20px auto; 
	}
	
	img {
	 	width: 200px;
	 	height: 200px;
	 	margin: 20px;
	 	border: 4px solid red;
	 	box-shadow: 10px 10px 10px pink;	 	
	}
	
	img:hover {
		opacity: 0.3;
	}
	
</style>
</head>

<div class="container">
			<span id="weather">날씨</span>의 종류
</div>
<hr>
<main>
	<img alt="날씨1" src="../images/sun.png">
	<img alt="날씨2" src="../images/rain.png">
	<img alt="날씨3" src="../images/cloud.png">
	<br>
	<img alt="날씨4" src="../images/cloud_sun.png">
	<img alt="날씨5" src="../images/snow.png">
	<img alt="날씨6" src="../images/etc.png">

</html>
