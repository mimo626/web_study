<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<h1>펜션 예약 서비스</h1>
<hr>
<form action="..." method="post">
	<label for=name>예약자명 : </label>
	<input type="text"  id=name name=name required><br><br>
	<label for=passwd>예약암호 : </label>
	<input type="password"  id=passwd name=passwd required><br><br>
	<label for=room>룸선택 : </label>
	<input type="radio" name=room value=r1>둘리
	<input type="radio" name=room value=r2>희동
	<input type="radio" name=room value=r3>도우너
	<input type="radio" name=room value=r4>또치<br><br>
	<label for=add>추가요청사항 : </label>
	<input type="checkbox" name=add value=a1>바베큐
	<input type="checkbox" name=add value=a2>수영장
	<input type="checkbox" name=add value=a3>낚시
	<input type="checkbox" name=add value=a4>조식<br><br>
	<label for=date>예약날짜 : </label>
	<input type="date"><br>
	<hr>
	<input type="submit" value="보내기">
	<input type="reset" value="다시작성하기">
	
</form>
</body>
</html>
