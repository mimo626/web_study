<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>CORS 스팩을 만족하는 않는 서비스 요청</h1>
	<hr>
	<script>
  		window.onload = function () {
    		fetch("http://localhost:9000/home")
      		.then(response => {
        		// 네트워크 응답이 성공(200-299)인지 확인
        		if (!response.ok) {
          			throw new Error(`HTTP 에러 발생! 상태코드: ${response.status}`);
        		}
        		// 텍스트 형태로 응답 데이터를 받음
        		return response.text();
      		})
      		.then(data => {
        		// 받아온 텍스트를 화면에 추가
        		document.body.innerHTML += `<h3>${data}</h3>`;
      		})
      		.catch(error => {
        		console.error("데이터를 가져오는 중 오류가 발생했습니다:", error);
      		});
  		};
</script>
</body>
</html>
