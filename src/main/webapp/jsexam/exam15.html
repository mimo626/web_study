<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<pre>
<script>
var ary1 = [ ];
var ary2 = new Array( );
var ary3 = new Array(10); // [ ,,,,,,,,, ]크기 new Array('A')
var ary4 = new Array(10, 5);
var ary5 = [10];
var ary6 = [10, 20, 30];
document.writeln("ary1.length - " + ary1.length); // 0
document.writeln("ary2.length - " + ary2.length); // 0
document.writeln("ary3.length - " + ary3.length); // 10
document.writeln("ary4.sort - " + ary4.sort((a, b) => a - b)); // 3
document.writeln("ary4.reverseSort - " + ary4.sort((a, b) => b-a)); // 3
document.writeln("ary5.length - " + ary5.length); // 1
document.writeln("ary6.length - " + ary6.length); // 3
document.writeln(ary4); // [10, 20, 30]
</script>
</pre>
</body>
</html>
