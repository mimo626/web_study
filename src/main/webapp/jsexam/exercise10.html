<script>
   function printObject(p){

   } 
   
   const obj1 = {
		  tag: "h2",
		  color: "blue",
		  msg: "파란색!"
   };
   const obj2 = {

	   };
   const obj3 = {
			  tag: "h2",
			  color: "red",
			  msg: "빨강색!"
	   };
   const obj4 = {
			  tag: "h3",
			  color: "green",
			  msg: "초록색!"
	   };
   const obj5 = {

</script>
