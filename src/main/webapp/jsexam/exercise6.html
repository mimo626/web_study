<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>자바스크립트 실습(6)</title>
<style>
    h1 {
        color: blue;
    }
    h2 {
        color: red;
    }
    ul {
        list-style-type: circle;
    }
</style>
</head>
<body>
    <h1>자바스크립트 실습(6)</h1>
    <script src="util.js"></script>
    <script>
        // var 대신 const를 사용하여 안전한 함수 선언
        const getMaxValue = (arr) => {
            let max = arr[0];
            for (let e of arr) {
                if (e > max) max = e;
            }
            return max;
        };

        const getMinValue = (arr) => {
            let min = arr[0];
            for (let e of arr) {
                if (e < min) min = e;
            }
            return min;
        };

        const getSum = (arr) => {
            let sum = 0;
            for (let e of arr) {
                sum += e;
            }
            return sum;
        };

        const getCountOddNum = (arr) => {
            let count = 0;
            for (let e of arr) {
                if (e % 2 === 1) count++;
            }
            return count;
        };
        
        const getCountEvenNum = (arr) => {
            let count = 0;
            for (let e of arr) {
                if (e % 2 === 0) count++;
            }
            return count;
        };
        
        // new Array() 대신 직관적인 배열 리터럴 [] 사용
        const arr = [10, 5, 7, 21, 4, 8, 18];
        
        write("모든 원소의 합 : " + getSum(arr), "h2");
        
        // 백틱(템플릿 리터럴)을 활용하여 HTML 구조를 한눈에 보이게 작성
        document.write(`
            <ul>
                <li>최대값 : ${getMaxValue(arr)}</li>
                <li>최소값 : ${getMinValue(arr)}</li>
                <li>짝수의 갯수 : ${getCountEvenNum(arr)}</li>
                <li>홀수의 갯수 : ${getCountOddNum(arr)}</li>
            </ul>
        `);
    </script>
</body>
</html>
