<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>ECMAScript6</title>
</head>
<body>
	<h1>간단한 객체 생성</h1>
	<hr>
	<script>
		const name = "Americano";
		const price = 3000;		
		const coffee = {
				name : name,
				price : price
		};		
		console.log(coffee);
		console.log(Object.keys(coffee));
		console.log(Object.values(coffee));
		console.log(Object.entries(coffee));		
		
		const coffee2 = {name, price}
		
		console.log(coffee2);
		console.log(Object.keys(coffee2));
		console.log(Object.values(coffee2));
		console.log(Object.entries(coffee2));	
	</script>
</body>
</html>
