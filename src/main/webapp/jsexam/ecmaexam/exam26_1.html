<title>Insert title here</title>
</head>
<body>
<h1>Promise 객체 - 나중에 결과를 줄께!!</h1>
<hr>
<h2>Promise 객체를 사용하는 이유 : 비동기 작업 순서를 깔끔하게 처리하기 위해</h2>
<h3>Promise 는 지금 바로 결과는 없지만, 작업이 끝나면 결과를 알려주겠다는 객체</h3>
<script>
function work() {

    return new Promise((resolve, reject) => {
        console.log("작업 시작");
        setTimeout(() => {
            resolve("작업 완료");
        }, 2000);
    });

}

work()
    .then((result) => {
        console.log(result);
    }).finally(() => {
		console.log("다음 작업");
    })
</script>
</body>

</html>
