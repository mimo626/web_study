<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>ECMAScript6</title>
</head>
<body>
    <h1>화살표 함수</h1>
    <hr>
    <ul>
    <li>클래스의 메서드로 사용하는 것은 가능</li>
    <li>화살표 함수는 생성자로 사용할 수 없음(자신만의 this 가 없기 때문)</li>        
    </ul>
	<pre>
		() => expression
		
		param => expression
		
		(param) => expression
		
		(param1, paramN) => expression

		() => {
  			statements
		}
		param => {
  			statements
		}
		(param1, paramN) => {
  			statements
		}    
    </pre>

	<script>	    
		const f = function(a, b) { return a + b};
		
		console.log(f(100, 5));
		
		const af = (a, b) => a + b;
		
		console.log(af(100, 5));
	</script>
</body>
</html>
