<body>
<h1>Promise 객체 - 나중에 결과를 줄께!!</h1>
<hr>
<h2>async/await 는 비동기 코드를 순서대로 실행되는 것처럼 보이게 해주는 문법적 설탕이다.</h2>
<h3>work() 를 await 으로 호출하면 Promise 작업이 끝날 때까지 기다리며,
resolve() 호출시 전달되는 값을 결과로 받게 된다.</h3>
<h3>await 는 async 로 선언된 함수 안에서만 사용할 수 있다.</h3>
<script>
function work() {
    return new Promise((resolve, reject) => {
        console.log("작업 시작");
        setTimeout(() => {
            resolve("작업 완료");
        }, 2000);
    });
}

async function run() {
    const result = await work();
    console.log(result);
    console.log("다음 작업");
}

run();
</script>
</body>
</html>
