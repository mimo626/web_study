<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>자바스크립트 실습12</title>
</head>
<body>
	<script>
		const num = Math.floor(Math.random()*3 + 1);
		const isConfirm = window.prompt("이동하시겠습니까?");
		
		if(isConfirm === null) {
			window.open('/edu/first.html');
		} else {
			let link; 
			if(num == 1) {
				link = "https://www.daum.net/"
			} else if(num == 2){
				link = "https://www.naver.com/";
			} else {
				link = "https://www.google.com/?hl=ko";
			}
			location.href = link;
		}
	</script>
</body>
</html>
