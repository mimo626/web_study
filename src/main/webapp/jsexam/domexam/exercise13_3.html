<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>자바스크립트 실습13_3</title>
</head>
<body>
	<h1>이벤트 모델-인라인</h1>
	<hr>
	<div>
		<button id = "red">빨강색</button>
		<button  id = "blue">파랑색</button>
		<button  id = "yellow">노란색</button>
	</div>
	<hr>
	<h3></h3>
	<script>
	
		window.onload = function(){
			document.querySelector("h3").textContent = "오늘은 " + getDate() + "입니다.";
		}
		
		let getDate = function() {
			const date = new Date();
			return `${date.getMonth()+1}월 ${date.getDate()}`;
		}
		
		/* onload 이벤트도 표준 이벤트로 변경 가능
		document.addEventListener("DOMContentLoaded", function() { 
		    document.querySelector("h3").textContent = "오늘은 " + getDate() + "입니다.";
		}); */
		
 		document.querySelector("div").addEventListener('click', function(event) {
		    if(event.target.tagName === "BUTTON") {
		        changeColor(event.target.id);
		    }}, false);
		
		
		function changeColor(color){
			document.querySelector("h3").style.color =color ;
		}
	</script>
</body>
</html>
